<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OG Preview Generator</title>
<style>
  @font-face{font-family:'Plus Jakarta Sans';font-style:normal;font-weight:300 600;font-display:swap;src:url('assets/fonts/Plus_Jakarta_Sans/PlusJakartaSans-VariableFont_wght.ttf') format('truetype');}
  @font-face{font-family:'Lora';font-style:italic;font-weight:400;font-display:swap;src:url('assets/fonts/Lora/Lora-Italic-VariableFont_wght.ttf') format('truetype');}

  body { margin: 0; padding: 0; background: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .og-card {
    width: 1200px;
    height: 630px;
    background: #1c2f24;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
  }

  /* Subtle sine wave decoration */
  .og-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 80% 50% at 90% 80%, rgba(137,196,162,.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(178,232,220,.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Top accent line */
  .og-card::after {
    content: '';
    position: absolute;
    top: 0; left: 90px; right: 90px;
    height: 3px;
    background: linear-gradient(90deg, #89c4a2 0%, #b2e8dc 40%, transparent 100%);
  }

  .og-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #89c4a2;
    opacity: .7;
    margin-bottom: 28px;
    position: relative;
  }

  .og-name {
    font-size: 64px;
    font-weight: 600;
    color: #f3ede3;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -.02em;
    position: relative;
  }

  .og-tagline {
    font-family: 'Lora', Georgia, serif;
    font-style: italic;
    font-size: 26px;
    color: #b2e8dc;
    opacity: .75;
    line-height: 1.4;
    margin-bottom: 40px;
    position: relative;
  }

  .og-services {
    display: flex;
    gap: 24px;
    position: relative;
  }

  .og-pill {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .08em;
    color: #89c4a2;
    border: 1px solid rgba(137,196,162,.25);
    padding: 8px 20px;
    border-radius: 100px;
  }

  .og-domain {
    position: absolute;
    bottom: 50px;
    right: 90px;
    font-size: 15px;
    font-weight: 400;
    color: #7d9882;
    letter-spacing: .06em;
  }

  /* Corner marks */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(137,196,162,.2);
    border-style: solid;
  }
  .corner.tl { top: 30px; left: 30px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 30px; right: 30px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 30px; left: 30px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 30px; right: 30px; border-width: 0 1px 1px 0; }

  p.hint {
    color: #999;
    font-family: sans-serif;
    font-size: 14px;
    margin-top: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<div>
  <div class="og-card" id="og">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="og-label">Freelance · UX & Product</div>
    <div class="og-name">Pascal Jäger</div>
    <div class="og-tagline">Systeme denken, Produkte formen.</div>

    <div class="og-services">
      <span class="og-pill">Research & Discovery</span>
      <span class="og-pill">UX & Interface Design</span>
      <span class="og-pill">Product Strategy</span>
      <span class="og-pill">Design Systems</span>
    </div>

    <div class="og-domain">pascaljaeger.de</div>
  </div>
  <p class="hint">↑ Rechtsklick → Screenshot (1200×630) → speichern als assets/img/og-preview.png</p>
</div>

</body>
</html>
